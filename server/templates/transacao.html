<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transferência</title>
  <link rel="stylesheet" href="/styles/transacao.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

<script>
  verificarLogin().then(usuario => {
    if (usuario) {
      console.log("Logado como:", usuario.nome);
    } 
  });
</script>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="avatar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
          <path d="M11.5 2C9 2 7 4 7 6.5v1H5v2h2v1H5v2h2v7h2v-7h4v-2H9v-1h4c1.4 0 2.5-1.1 2.5-2.5S14.4 4.5 13 4.5h-.5V2h-1zm0 2h1c.8 0 1.5.7 1.5 1.5S13.3 7 12.5 7H9V6.5C9 5.1 10.1 4 11.5 4z"/>
        </svg>
      </div>
    </header>

    <!-- Info Card -->
    <div class="info-card">
      <p class="info-title">Qual é o valor da transferência?</p>
      <p class="info-balance">Saldo disponível na conta: <span>R$ ....</span></p>
    </div>

    <!-- Display -->
    <div class="display-wrapper">
      <div class="display" id="display">R$: 0,00</div>
    </div>

    <!-- Numpad -->
    <div class="numpad">
      <button class="key" data-val="1">1</button>
      <button class="key" data-val="2">2</button>
      <button class="key" data-val="3">3</button>
      <button class="key" data-val="4">4</button>
      <button class="key" data-val="5">5</button>
      <button class="key" data-val="6">6</button>
      <button class="key" data-val="7">7</button>
      <button class="key" data-val="8">8</button>
      <button class="key" data-val="9">9</button>
      <button class="key key-empty"></button>
      <button class="key" data-val="0">0</button>
      <button class="key key-del" id="del-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3.41 13L17 17.59 14.41 15 12 17.41 9.59 15 7 17.59 5.41 16l2.59-2.59L5.41 11 7 9.41 9.59 12 12 9.59 14.41 12 17 9.41 18.59 11l-2.58 2.41L18.59 16z"/>
        </svg>
      </button>
    </div>

    <!-- Button -->
    <button type="button" class="continue-btn" id="continue-btn">
      CONTINUAR
      
      <!-- Logozinha daora -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
      </svg>
    </button>

  </div>
  <script src="/requisições/transacao.js"></script>
</body>
</html>
