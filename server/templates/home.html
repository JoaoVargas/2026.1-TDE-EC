<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BetaBank</title>
  <link rel="stylesheet" href="../styles/home.css">
</head>
<body>

  <div class="pagina">

    <!-- Coluna esquerda: menu -->
    <aside class="sidebar">
      <h2 class="logo">BetaBank</h2>

      <nav>
        <a href="#" class="menu-item ativo">Início</a>
        <a href="#" class="menu-item">Transferências</a>
        <a href="#" class="menu-item">Investimentos</a>
        <a href="#" class="menu-item">Cartão</a>
        <a href="#" class="menu-item">Seguros</a>
      </nav>

      <div class="perfil">
        <div class="avatar">V</div>
        <span>Vinicius</span>
      </div>
    </aside>

    <!-- Coluna direita: conteúdo -->
    <main class="conteudo">

      <h1 class="saudacao">Olá, Vinicius 👋</h1>

      <!-- Card de saldo -->
      <div class="card-saldo">
        <div>
          <p class="saldo-label">SALDO TOTAL</p>
          <p class="saldo-valor">R$ 1.250,00</p>
        </div>
        <span class="seta">›</span>
      </div>

      <!-- Grid de cards informativos -->
      <div class="grid-cards">

        <div class="card card--escuro">
          <h3>Seguros BetaBank</h3>
          <p>Todo seguro que sua família precisa</p>
          <button class="btn btn--dourado">Conhecer</button>
        </div>

        <div class="card card--escuro">
          <h3>Cartão de crédito</h3>
          <p class="label-fatura">Fatura atual</p>
          <p class="valor-fatura">R$ 0,00</p>
        </div>

        <div class="card card--dourado">
          <h3>Termos de uso</h3>
          <p>Entenda o documento do BetaBank</p>
          <button class="btn btn--verde">Conhecer</button>
        </div>

      </div>
    </main>

  </div>

</body>
</html>
