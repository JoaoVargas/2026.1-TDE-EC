<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Conta</title>    
  <link rel="stylesheet" href="../styles/cadastro.css" />
</head>
<body>

  <div class="logo"><img  src="http://localhost:8000/static/imagens/slogan.png" alt=""></div>
 
  <div class="page">
 
    <h1>CRIAR CONTA</h1>
 
    <div class="form-grid">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
      </div>
      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" />
      </div>
      <div class="form-group">
        <label for="nascimento">Data de nascimento</label>
        <input type="date" id="nascimento" name="nascimento" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" />
      </div>
      <div class="form-group">
        <label for="confirmar">Confirmar senha</label>
        <input type="password" id="confirmar" name="confirmar" />
      </div>
    </div>
 
    <hr class="divider" />
 
    <h2>ENDEREÇO</h2>
 
    <div class="form-grid">
      <div class="form-group">
        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" class="highlight" />
      </div>
      <div class="form-group">
        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" name="logradouro" class="highlight" />
      </div>
      <div class="form-group">
        <label for="numero">Numero</label>
        <input type="text" id="numero" name="numero" />
      </div>
      <div class="form-group">
        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" />
      </div>
      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade" />
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <input type="text" id="estado" name="estado" />
      </div>
    </div>
 
    <!-- Mensagem de feedback -->
    <div id="mensagem" class="mensagem" style="display:none;"></div>
 
    <div class="actions">
      <button class="btn-voltar" onclick="history.back()">Voltar</button>
      <button class="btn-finalizar" id="btn-finalizar">Finalizar Cadastro</button>
    </div>
 
  </div>
 
  <script src="../requisições/cadastro.js"></script>
 
</body>
</html>
