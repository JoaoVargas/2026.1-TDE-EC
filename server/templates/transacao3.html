<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transferência Concluída</title>
  <link rel="stylesheet" href="/server/styles/transacao3.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<script src="/requisições/auth.js"></script>
<script>
  verificarLogin().then(usuario => {
    if (usuario) {
      console.log("Logado como:", usuario.nome);
    }
  });
</script>
  <div class="blob blob-top"></div>
  <div class="blob blob-bottom"></div>

  <div class="app">

    <!-- Header logo -->
    <header class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
          <path d="M11.5 2C9 2 7 4 7 6.5v1H5v2h2v1H5v2h2v7h2v-7h4v-2H9v-1h4c1.4 0 2.5-1.1 2.5-2.5S14.4 4.5 13 4.5h-.5V2h-1zm0 2h1c.8 0 1.5.7 1.5 1.5S13.3 7 12.5 7H9V6.5C9 5.1 10.1 4 11.5 4z"/>
        </svg>
      </div>
    </header>

    <!-- Check icon -->
    <div class="check-wrapper">
      <div class="check-ring ring-3"></div>
      <div class="check-ring ring-2"></div>
      <div class="check-ring ring-1"></div>
      <div class="check-circle">
        <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <!-- Text -->
    <div class="content">
      <h1 class="title">Transferência<br/>Concluída!</h1>
      <p class="subtitle">Seu dinheiro foi enviado com sucesso</p>

      <div class="detail-card">
        <div class="detail-row">
          <span class="detail-label">Valor</span>
          <span class="detail-value" id="detalhe-valor">R$ —</span>
        </div>
        <div class="divider"></div>
        <div class="detail-row">
          <span class="detail-label">Para</span>
          <span class="detail-value" id="detalhe-nome">—</span>
        </div>
        <div class="divider"></div>
        <div class="detail-row">
          <span class="detail-label">Banco</span>
          <span class="detail-value" id="detalhe-banco">—</span>
        </div>
        <div class="divider"></div>
        <div class="detail-row">
          <span class="detail-label">Data</span>
          <span class="detail-value" id="detalhe-data">—</span>
        </div>
      </div>
    </div>

    <!-- Back button -->
    <button class="menu-btn" onclick="window.location.href='/server/templates/home.html'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      Voltar ao Menu
    </button>

  </div>

  <script src="/server/requisições/transacao3.js"></script>
</body>
</html>
