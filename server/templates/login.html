<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BetaBank</title>
  <link rel="stylesheet" href="../styles/login.css" />
</head>
<body>

  <div class="container">

    <!-- Painel Esquerdo -->
    <div class="left-panel">
      <div class="logo-circle">
        <span><img src="http://localhost:8000/static/imagens/slogan.jpeg" alt="" style="height: 100px;"></span>
      </div>
      <div class="divider"></div>
      <h2>BEM VINDO DE VOLTA</h2>
      <p>Sua segurança é nossa prioridade. Acesse sua conta para gerenciar seu dinheiro com praticidade.</p>
    </div>

    <!-- Painel Direito -->
    <div class="right-panel">
      <h1>ACESSO DE LOGIN</h1>

      <div class="form-group">
        <label for="cpf">CPF / Código da Conta</label>
        <input type="text" id="cpf" name="cpf" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" />
      </div>

      <div class="forgot-link">
        <a href="#">Esqueci a senha</a>
      </div>

      <div id="mensagem" class="mensagem" style="display:none;"></div>

      <button class="btn-login" id="btn-login">LOGIN</button>

      <p class="register-text">Nao tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>

  </div>

  <script src="../requisições/login.js"></script>

</body>
</html>
