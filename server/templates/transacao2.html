<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transferência - Contatos</title>
  <link rel="stylesheet" href="/styles/transacao2.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<script src="../requisições/auth.js"></script>
<script>
  verificarLogin().then(usuario => {
    if (usuario) {
      console.log("Logado como:", usuario.nome);
    } else {
      window.location.href = '../templates/login.html';
    }
  });
</script>
  <div class="blob blob-left"></div>
  <div class="blob blob-right"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <button class="back-btn" onclick="history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
        </svg>
        Voltar
      </button>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
          <path d="M11.5 2C9 2 7 4 7 6.5v1H5v2h2v1H5v2h2v7h2v-7h4v-2H9v-1h4c1.4 0 2.5-1.1 2.5-2.5S14.4 4.5 13 4.5h-.5V2h-1zm0 2h1c.8 0 1.5.7 1.5 1.5S13.3 7 12.5 7H9V6.5C9 5.1 10.1 4 11.5 4z"/>
        </svg>
      </div>
    </header>

    <!-- Title -->
    <div class="title-block">
      <h1 class="title">Para quem você quer tranferir <span id="valor-titulo">R$ 0000.00 </span>?</h1>
      <p class="subtitle">Encontre um contato ou inicie uma nova transferência</p>
      <div class="title-line"></div>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Nome, CPF/CNPJ"
        autocomplete="off"
      />
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </div>

    <!-- Contacts -->
    <div class="contacts-section">
      <p class="contacts-label">Contatos</p>
      <div class="contacts-grid" id="contacts-grid">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Continue Button -->
    <button class="continue-btn" id="continue-btn">
      CONTINUAR
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
      </svg>
    </button>

  </div>

  <script src="/requisições/transacao2.js"></script>
</body>
</html>
