services:
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_local_data:/data
    networks:
      - mynetwork
  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: bancodigital
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_local_data:/var/lib/mysql
      - ../db/INIT.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - mynetwork

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - mynetwork

volumes:
  mysql_local_data:
    driver: local
    driver_opts:
      type: none
      device: ../db/mysql_data
      o: bind
  portainer_local_data:
    driver: local
    driver_opts:
      type: none
      device: ../db/portainer_data/
      o: bind

networks:
  mynetwork:
    driver: bridge