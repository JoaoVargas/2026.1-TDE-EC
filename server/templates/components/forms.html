{% macro input_field(id, label, type='text', autocomplete='off', extra_class='', value='') -%}
<div class="form-group">
    <label class="ui-label" for="{{ id }}">{{ label }}</label>
    <input
        type="{{ type }}"
        id="{{ id }}"
        name="{{ id }}"
        autocomplete="{{ autocomplete }}"
        class="ui-input {{ extra_class }}"
        value="{{ value }}"
    />
</div>
{%- endmacro %}
